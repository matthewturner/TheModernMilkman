name: CI

on:
  push:
    branches: main
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.11
      - name: Install dependencies
        run: pip install -r requirements.test.txt
      - name: Run tests
        run: pytest
